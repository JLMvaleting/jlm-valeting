<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLM Valeting</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{--blue:#2563eb;--dark:#020617}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--dark);
  color:#fff;
}

/* HEADER */
header{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;align-items:center;
padding:14px 40px;background:rgba(2,6,23,0.85);
backdrop-filter:blur(12px);z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.05)
}

.logo img{height:75px}

nav a{color:#cbd5f5;margin-left:25px;text-decoration:none}

.top-info{
position:absolute;left:50%;transform:translateX(-50%);
display:flex;gap:20px;font-size:13px;color:#cbd5f5
}

/* HERO */
.hero{
min-height:100vh;
background:url("hero.jpg") center/cover no-repeat;
display:flex;align-items:center;padding:0 8%;
padding-top:120px; /* FIX */
position:relative;
}

.hero::before{
content:'';position:absolute;inset:0;
background:linear-gradient(90deg, rgba(2,6,23,0.85) 0%, rgba(2,6,23,0.6) 40%, transparent 100%);
}

.hero-content{position:relative;max-width:700px}

/* TEXT */
.hero-title{
font-size:60px;line-height:1.1;font-weight:700;margin-bottom:15px;
}

.hero-title span{
background:linear-gradient(90deg,#60a5fa,#2563eb);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero-sub{color:#cbd5f5;font-size:18px;margin-bottom:25px}

/* CTA */
.cta{
display:inline-block;
padding:14px 26px;
background:#2563eb;
border-radius:12px;color:#fff;text-decoration:none;
}

/* MOBILE FIX */
@media(max-width:768px){

header{
flex-direction:column;
padding:10px;
}

.logo img{
height:55px;
}

.top-info{
position:static;
transform:none;
flex-direction:column;
align-items:center;
gap:5px;
margin-top:5px;
}

nav{
margin-top:8px;
}

.hero{
padding-top:180px; /* FIXES BLANK SCREEN */
}

.hero-title{
font-size:40px;
}

}
</style>
</head>

<body>

<header>
<div class="logo"><img src="logo.png"></div>

<div class="top-info">
<span>📧 contact@jlmvaleting.co.uk</span>
<span>📍 Exeter, Devon</span>
</div>

<nav>
<a href="#services">Services</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Quote</a>
</nav>
</header>

<section class="hero">
<div class="hero-content">

<h1 class="hero-title">
Showroom Finish.<br>
<span>Every Single Time.</span>
</h1>

<p class="hero-sub">
Premium mobile valeting in Exeter & surrounding areas.
</p>

<a href="quote.html" class="cta">Get a Quote Now</a>

</div>
</section>

</body>
</html>
